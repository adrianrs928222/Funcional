services:
  - type: web
    name: funcional
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: TZ
        value: Europe/Madrid
      - key: APISPORTS_BASE_URL
        value: https://v3.football.api-sports.io
      - key: API_KEY
        sync: false